<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <polygon points="0,0 10,5 0,10" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="220" fill="#FFFFFF"/>

  <text x="600" y="25" text-anchor="middle" font-size="14" font-weight="600" fill="#1F2937">A Git négy színtere és az adatáramlás iránya</text>

  <!-- Box 1: Working Directory -->
  <rect x="40" y="50" width="220" height="120" rx="12" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="150" y="95" text-anchor="middle" font-size="17" font-weight="700" fill="#92400E">Working Directory</text>
  <text x="150" y="120" text-anchor="middle" font-size="14" fill="#92400E" fill-opacity="0.85">Munkakönyvtár</text>
  <text x="150" y="148" text-anchor="middle" font-size="11" fill="#92400E" fill-opacity="0.65">itt szerkeszted a fájlokat</text>

  <!-- Arrow 1: git add -->
  <text x="300" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#1F2937">git add</text>
  <line x1="270" y1="110" x2="328" y2="110" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Box 2: Staging Area -->
  <rect x="340" y="50" width="220" height="120" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="450" y="95" text-anchor="middle" font-size="17" font-weight="700" fill="#1E3A8A">Staging Area</text>
  <text x="450" y="120" text-anchor="middle" font-size="14" fill="#1E3A8A" fill-opacity="0.85">Előkészítő terület</text>
  <text x="450" y="148" text-anchor="middle" font-size="11" fill="#1E3A8A" fill-opacity="0.65">commitba kerülő változtatások</text>

  <!-- Arrow 2: git commit -->
  <text x="600" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#1F2937">git commit</text>
  <line x1="570" y1="110" x2="628" y2="110" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Box 3: Helyi Repository -->
  <rect x="640" y="50" width="220" height="120" rx="12" fill="#DCFCE7" stroke="#059669" stroke-width="2"/>
  <text x="750" y="95" text-anchor="middle" font-size="17" font-weight="700" fill="#065F46">Helyi Repository</text>
  <text x="750" y="120" text-anchor="middle" font-size="14" fill="#065F46" fill-opacity="0.85">Local Repository</text>
  <text x="750" y="148" text-anchor="middle" font-size="11" fill="#065F46" fill-opacity="0.65">a gépeden Git-tárolva</text>

  <!-- Arrow 3: git push -->
  <text x="900" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#1F2937">git push</text>
  <line x1="870" y1="110" x2="928" y2="110" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <!-- Box 4: Távoli Repository -->
  <rect x="940" y="50" width="220" height="120" rx="12" fill="#F3E8FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="1050" y="95" text-anchor="middle" font-size="17" font-weight="700" fill="#5B21B6">Távoli Repository</text>
  <text x="1050" y="120" text-anchor="middle" font-size="14" fill="#5B21B6" fill-opacity="0.85">Remote Repository</text>
  <text x="1050" y="148" text-anchor="middle" font-size="11" fill="#5B21B6" fill-opacity="0.65">a GitHub szerverén</text>

</svg>
